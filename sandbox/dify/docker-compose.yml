services:
  dify-api:
    image: langgenius/dify-api:0.7.0
    container_name: dify-api
    ports:
      - "8081:5001"
    environment:
      - MODE=api
      - SECRET_KEY=change-me-secret-key-for-local-dev
      - CONSOLE_WEB_URL=http://localhost:3000
      - DB_HOST=dify-postgres
      - DB_PORT=5432
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
      - DB_DATABASE=dify
      - REDIS_HOST=dify-redis
      - REDIS_PORT=6379
    depends_on:
      - dify-postgres
      - dify-redis
    restart: unless-stopped

  dify-web:
    image: langgenius/dify-web:0.7.0
    container_name: dify-web
    ports:
      - "3000:3000"
    environment:
      - CONSOLE_API_URL=http://localhost:8081
    depends_on:
      - dify-api
    restart: unless-stopped

  dify-postgres:
    image: postgres:15
    container_name: dify-postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=dify
    volumes:
      - dify_postgres:/var/lib/postgresql/data
    restart: unless-stopped

  dify-redis:
    image: redis:7-alpine
    container_name: dify-redis
    volumes:
      - dify_redis:/data
    restart: unless-stopped

volumes:
  dify_postgres:
  dify_redis:
